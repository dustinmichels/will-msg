[tools]
go = "latest"

[tasks.build]
description = "Build and package binaries for macOS and Windows"
depends = ["build-darwin", "build-windows"]

[tasks.build-darwin]
description = "Build and package macOS binaries (separate arm64 and amd64 bundles)"
run = "./scripts/build-darwin.sh"

[tasks.build-windows]
description = "Build and package Windows binary (amd64)"
run = """
fyne-cross windows -arch amd64
mkdir -p bin
cp fyne-cross/bin/windows-amd64/will-msg.exe bin/will-msg-windows-amd64.exe
cp fyne-cross/dist/windows-amd64/will-msg.exe.zip bin/will-msg-windows-amd64.zip
"""

[tasks.parse]
description = "Parse a message file from data-new"
run = '''
#!/usr/bin/env bash
if [ -z "$1" ]; then
  echo "Usage: mise run parse <msg_file_name_or_path>"
  exit 1
fi
file="$1"
if [[ ! "$file" =~ ^data-new/ ]]; then
  file="data-new/$file"
fi
go run ./cmd/msgcat "$file"
'''
